<svg width="265" height="100" viewBox="0 0 265 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Inyección de la fuente web Outfit para VS Code -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
  </style>

  <!-- Símbolo finamente ajustado en proporción -->
  <g transform="translate(10, 15) scale(0.35)">
    <circle cx="100" cy="100" r="70" stroke="#312E81" stroke-width="28" />
    <circle cx="150" cy="50" r="28" fill="#1E1B4B" />
    <circle cx="100" cy="100" r="14" fill="#312E81" />
  </g>
  
  <!-- Texto "Omnia" con peso ExtraBold (800), más grande, pegado al símbolo y con tracking estrecho para un aspecto macizo -->
  <text x="90" y="68" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="800" font-size="52" fill="#1E1B4B" letter-spacing="-0.02em">
    Omnia
  </text>
</svg>
