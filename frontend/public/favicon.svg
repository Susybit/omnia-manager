<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ring { stroke: #312E81; }
    .node { fill: #1E1B4B; }
    .dot { fill: #312E81; }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #E2E8F0; }
      .node { fill: #FFFFFF; }
      .dot { fill: #E2E8F0; }
    }
  </style>
  <circle cx="100" cy="100" r="70" class="ring" stroke-width="28" />
  <circle cx="150" cy="50" r="28" class="node" />
  <circle cx="100" cy="100" r="14" class="dot" />
</svg>