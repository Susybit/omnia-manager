<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paleta de Colores - Omnia</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #F5F3FF; /* Fondo Omnia */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .colors {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .color-box {
            width: 150px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .color-swatch {
            height: 120px;
            width: 100%;
        }
        .color-info {
            padding: 15px;
            background: white;
            font-size: 14px;
        }
        .color-info strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Paleta de Colores: Omnia (Actualizada)</h1>
        <p>Con Fondo original y Morado Noche para botones.</p>
        
        <div class="colors">
            <!-- Primario -->
            <div class="color-box">
                <div class="color-swatch" style="background-color: #312E81;"></div>
                <div class="color-info">
                    <strong>Primario (Navbar)</strong>
                    #312E81<br>Índigo Oscuro
                </div>
            </div>

            <!-- Acento -->
            <div class="color-box">
                <div class="color-swatch" style="background-color: #1E1B4B;"></div>
                <div class="color-info">
                    <strong>Acento (Botones)</strong>
                    #1E1B4B<br>Morado Noche
                </div>
            </div>

            <!-- Fondo Original -->
            <div class="color-box">
                <div class="color-swatch" style="background-color: #F4F4F5; border: 1px solid #ccc;"></div>
                <div class="color-info">
                    <strong>Fondo (Sin tocar)</strong>
                    #F4F4F5<br>Gris perla
                </div>
            </div>
            
            <!-- Texto -->
            <div class="color-box">
                <div class="color-swatch" style="background-color: #4F46E5;"></div>
                <div class="color-info">
                    <strong>Secundario</strong>
                    #4F46E5<br>Índigo medio
                </div>
            </div>
        </div>
    </div>
</body>
</html>
