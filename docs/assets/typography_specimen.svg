  <text x="320" y="232" font-family="'Inter', sans-serif" font-weight="400" font-size="13" fill="#64748B">Incorporado el 12 ene 2024</text>
  <text x="320" y="248" font-family="'Inter', sans-serif" font-weight="500" font-size="10" fill="#94A3B8">Texto secundario · 13 px · peso 400</text>
  <line x1="320" y1="264" x2="548" y2="264" stroke="#F4F4F5" stroke-width="1"/>

