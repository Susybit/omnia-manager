  <text x="320" y="299" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#64748B" letter-spacing="0.05em">ESTADO CIVIL</text>
  <text x="320" y="315" font-family="'Inter', sans-serif" font-weight="500" font-size="10" fill="#94A3B8">Etiquetas de formulario · 11 px · peso 700</text>
