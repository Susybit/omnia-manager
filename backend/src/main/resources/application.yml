spring:
  datasource:
    # Configuración de persistencia MariaDB/MySQL
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/practica?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      # Sincronización automática de esquema y dataset de referencia
      mode: never
      schema-locations: classpath:db/mysql_DDL_PRACTICA.sql
      data-locations: classpath:db/data.sql

  jpa:
    hibernate:
      # Definición de DDL gestionada mediante scripts externos
      ddl-auto: none

    # Habilitación de auditoría de sentencias SQL
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  # Configuración de puerto para el despliegue
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
